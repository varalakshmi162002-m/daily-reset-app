<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <!-- Cute font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #f3ecff; /* lighter lavender */
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            z-index: 1;
        }

        h2 {
            color: #7b5ea7;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .card {
            background: #ffffff;
            padding: 18px;
            margin: 12px auto;
            border-radius: 20px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
            width: 260px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid #e5d4ff;
        }

        .card:hover {
            transform: translateY(-5px) scale(1.03);
            background: #f9f4ff;
            box-shadow: 0 10px 25px rgba(123, 94, 167, 0.2);
        }

        .quote {
            font-size: 12px;
            color: #a084dc;
            margin-top: 5px;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* 🦋 BUTTERFLY ANIMATION */
        .butterflies {
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }

        .butterfly {
            position: absolute;
            font-size: 20px;
            animation: fly linear infinite;
        }

        @keyframes fly {
            0% {
                transform: translateY(100vh);
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

<!-- 🦋 Butterflies -->
<div class="butterflies"></div>

<div class="container">
    <h2>✨ My Space ✨</h2>

    <a href="#">
        <div class="card">
            💗 To-Do List
            <div class="quote">"One step at a time"</div>
        </div>
    </a>

    <a href="#">
        <div class="card">
            🌸 Habit Tracker
            <div class="quote">"Consistency creates magic"</div>
        </div>
    </a>

    <a href="#">
        <div class="card">
            🎀 Things To Do
            <div class="quote">"Make life a little fun"</div>
        </div>
    </a>

    <a href="#">
        <div class="card">
            📚 Books
            <div class="quote">"Escape into stories"</div>
        </div>
    </a>

    <a href="#">
        <div class="card">
            💰 Finance
            <div class="quote">"Grow your future wisely"</div>
        </div>
    </a>

    <br>
    <a href="/logout">Logout</a>
</div>

<!-- 🦋 Butterfly animation script -->
<script>
    function createButterfly() {
        const b = document.createElement("div");
        b.classList.add("butterfly");
        b.innerHTML = "🦋";

        b.style.left = Math.random() * 100 + "vw";
        b.style.fontSize = (Math.random() * 10 + 15) + "px";
        b.style.animationDuration = (Math.random() * 3 + 4) + "s";

        document.querySelector(".butterflies").appendChild(b);

        setTimeout(() => {
            b.remove();
        }, 6000);
    }

    setInterval(createButterfly, 500);
</script>

</body>
</html>
